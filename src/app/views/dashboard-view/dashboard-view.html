<div class="empty-notification-wrapper" *ngIf="!layoutSelected">
  <div class="empty-notification">
    <p class="title">Dashboard ist leer</p>
    Wählen Sie eine Vorlage, um zu starten
    <button (click)="onClickAddLayout()"><i class="fa-regular fa-square-plus"></i>Layout generieren</button>
  </div>
</div>
<div class="grid-wrapper" *ngIf="layoutSelected">
  <dashboard-grid [layoutId]="layoutId"></dashboard-grid>
</div>
